# Operation 1: List all properties (Publicly accessible)
query ListAllProperties @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it lists properties available to all users.") {
  properties(limit: 20, orderBy: [{createdAt: DESC}]) {
    id
    title
    address
    city
    price
    propertyType
    bedrooms
    bathrooms
    areaSqFt
    images_on_property(limit: 1, orderBy: [{order: ASC}]) {
      imageUrl
    }
  }
}

# Operation 2: Get the current user's profile (Accessible to logged-in users)
query MyProfile @auth(level: USER) {
  user(key: {id_expr: "auth.uid"}) {
    id
    displayName
    email
    userType
    phoneNumber
    photoUrl
    bio
    createdAt
    # Optionally, list properties owned by this user if they are an agent
    properties_on_agent(limit: 5) {
      id
      title
      city
      price
    }
    # Optionally, list favorite properties for this user if they are a buyer
    favorites_on_buyer(limit: 5) {
      property {
        id
        title
        city
      }
    }
  }
}

# Operation 3: Create a new property (Accessible to authenticated agents)
mutation CreateProperty(
  $title: String!
  $address: String!
  $city: String!
  $price: Int64!
  $propertyType: String!
  $status: String!
  $bedrooms: Int!
  $bathrooms: Int!
  $areaSqFt: Int!
  $description: String
  $yearBuilt: Int
  $amenities: [String!]
  $virtualTourLink: String
  $latitude: Float
  $longitude: Float
) @auth(level: USER, expr: "auth.token.userType == 'agent'") {
  property_insert(data: {
    title: $title
    address: $address
    city: $city
    price: $price
    propertyType: $propertyType
    status: $status
    bedrooms: $bedrooms
    bathrooms: $bathrooms
    areaSqFt: $areaSqFt
    description: $description
    yearBuilt: $yearBuilt
    amenities: $amenities
    virtualTourLink: $virtualTourLink
    latitude: $latitude
    longitude: $longitude
    createdAt_expr: "request.time"
    agentId_expr: "auth.uid"
  })
}

# Operation 4: Add a property to the current user's favorites (Accessible to logged-in users)
mutation AddPropertyToFavorites($propertyId: UUID!) @auth(level: USER) {
  favorite_insert(data: {
    buyerId_expr: "auth.uid"
    propertyId: $propertyId
    createdAt_expr: "request.time"
  })
}